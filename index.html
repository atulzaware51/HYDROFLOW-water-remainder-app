<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Hydrated</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Time for a glass of water!</h1>
        
        <div class="drop-container">
            <svg id="water-drop" class="water-drop" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
        </div>
        
        <button id="log-btn" class="btn">Log Drink</button>
    </div>

    <div id="snackbar" class="snackbar">Great job hydrating! 💧</div>

    <script src="script.js"></script>
</body>
</html>
